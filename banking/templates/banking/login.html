{% extends "base.html" %}
{% load static %}
{% load i18n %}

{% block styles %}
{% endblock styles %}

{% block content %}

    <form class="standard-form" method="post">
        {% csrf_token %}
        {{form.username.label_tag}} <br>
        {{form.username}} <br>
        {{form.password.label_tag}} <br>
        {{form.password}} <br>

        <button class="submit" type="submit">{% trans "Log in" %}</button>
        <button class="reset" type="reset">{% trans "Clear" %}</button>
    </form>
{% endblock content %}
